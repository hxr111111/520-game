name: Build Android APK

# 触发方式：手动点按钮，或当游戏/配置文件改动并推送时自动构建
on:
  workflow_dispatch:
  push:
    branches: [ master ]
    paths:
      - 'www/**'
      - 'package.json'
      - 'capacitor.config.json'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 配置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装依赖
        run: npm install

      - name: 添加 Android 平台
        run: npx cap add android

      - name: 同步 Web 资源到原生项目
        run: npx cap sync android

      - name: 编译 Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: 重命名 APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk yuyu-520.apk

      - name: 上传 APK 成品
        uses: actions/upload-artifact@v4
        with:
          name: yuyu-520-apk
          path: yuyu-520.apk
          retention-days: 30
